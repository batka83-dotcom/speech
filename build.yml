name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Python суулгах
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Сангууд суулгах
      run: |
        pip install pyinstaller SpeechRecognition pyaudio pyperclip

    - name: EXE бүтээх
      run: |
        pyinstaller --onefile --windowed `
          --name "ЯриаТекст" `
          --hidden-import=speech_recognition `
          --hidden-import=pyaudio `
          --hidden-import=pyperclip `
          app.py

    - name: EXE татаж авах
      uses: actions/upload-artifact@v4
      with:
        name: ЯриаТекст-EXE
        path: dist/ЯриаТекст.exe
